general {
    border_size = 3
    gaps_in = 6
    gaps_out = 12

    # Oro -> Amarillo Claro -> Oro (Brillo metálico)
    col.active_border = rgba(ffd700ff) rgba(ffec8bff) rgba(ffd700ff) 45deg
    
    col.inactive_border = rgba(333333aa)
    layout = dwindle
    resize_on_border = true
}

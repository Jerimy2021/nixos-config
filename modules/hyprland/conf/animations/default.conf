# -----------------------------------------------------
# Animation - ULTIMATE FUSION
# -----------------------------------------------------

animations {
    enabled = true

    # --- CURVAS DE MOVIMIENTO (Tus beziers originales Pro) ---
    bezier = linear, 0, 0, 1, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92 
    bezier = menu_decel, 0.1, 1, 0, 1
    
    # --- CONFIGURACIÓN DE ANIMACIONES ---
    
    # 1. VENTANAS (Apertura suave y profesional)
    # Usamos md3_decel para que se sienta como un Mac/Pixel
    animation = windows, 1, 3, md3_decel, popin 60%
    animation = windowsIn, 1, 3, md3_decel, popin 60%
    animation = windowsOut, 1, 3, md3_accel, popin 60%
    
    # 2. TRANSICIÓN DE COLOR DE BORDE
    animation = border, 1, 10, default

    # 3. EL MOTOR DE ENERGÍA (Aquí está el truco del fuego) 🔥
    # borderangle: Hace que los colores del borde giren.
    # 'linear' es vital para que gire constante sin frenarse.
    # 'loop' hace que nunca pare.
    # Velocidad 30 = Energía rápida / 100 = Respiración lenta. 
    # Lo dejamos en 40 para un balance perfecto.
    animation = borderangle, 1, 40, linear, loop

    # 4. WORKSPACES (Escritorios)
    animation = workspaces, 1, 5, menu_decel, slide
}

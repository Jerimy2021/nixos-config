# -----------------------------------------------------
# Atajos de Teclado
# name: "Default"
# -----------------------------------------------------

$mainMod = SUPER
$HYPRSCRIPTS = ~/.config/hypr/scripts
$SCRIPTS = ~/.config/ml4w/scripts

# ---------------------------------------------------------
# APLICACIONES PRINCIPALES
# ---------------------------------------------------------
bind = $mainMod, K, exec, ~/.config/ml4w/settings/terminal.sh             # Terminal
bind = $mainMod, B, exec, ~/.config/ml4w/settings/browser.sh              # Navegador Web
bind = $mainMod, E, exec, ~/.config/ml4w/settings/filemanager.sh          # Archivos
bind = $mainMod CTRL, E, exec, ~/.config/ml4w/settings/emojipicker.sh     # Emojis
bind = $mainMod CTRL, RETURN, exec, ~/.config/hypr/scripts/launcher.sh    # Menú de Apps
bind = $mainMod, V, exec, $SCRIPTS/cliphist.sh                            # Historial de Portapapeles
bind = $mainMod CTRL, C, exec, ~/.config/ml4w/settings/calculator.sh      # Calculadora

# Pantalla (Zoom)
bind = $mainMod SHIFT, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') + 0.5}") # Aumentar zoom de la pantalla

bind = $mainMod SHIFT, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') - 0.5}") # Reducir zoom de la pantalla

bind = $mainMod SHIFT, Z, exec, hyprctl keyword cursor:zoom_factor 1 # Restablecer zoom de la pantalla

# Ventanas
bind = $mainMod, Q, killactive                                      # Cerrar ventana actual
bind = $mainMod, F, fullscreen, 0                                   # Pantalla completa
bind = $mainMod, T, togglefloating                                  # Ventana flotante
bind = $mainMod, J, togglesplit                                     # Dividir ventana
bind = $mainMod, M, exit                                            # Maximizar ventana
# Mover el foco (Teclas de dirección)
bind = $mainMod, left, movefocus, l                                 # Mover foco a la izquierda
bind = $mainMod, right, movefocus, r                                # Mover foco a la derecha
bind = $mainMod, up, movefocus, u                                   # Mover foco hacia arriba
bind = $mainMod, down, movefocus, d                                 # Mover foco hacia abajo
# Mover y redimensionar con el Mouse
bindm = $mainMod, mouse:272, movewindow                             # Click Izquierdo para mover
bindm = $mainMod, mouse:273, resizewindow                           # Click Derecho para redimensionar

bind = $mainMod SHIFT, Q, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill # Forzar cierre de ventana y sus procesos
bind = $mainMod SHIFT, T, workspaceopt, allfloat                                            # Alternar todas las ventanas a flotante
bind = $mainMod SHIFT, right, resizeactive, 100 0                                           # Aumentar ancho de ventana (teclado)
bind = $mainMod SHIFT, left, resizeactive, -100 0                                           # Reducir ancho de ventana (teclado)
bind = $mainMod SHIFT, down, resizeactive, 0 100                                            # Aumentar alto de ventana (teclado)
bind = $mainMod SHIFT, up, resizeactive, 0 -100                                             # Reducir alto de ventana (teclado)
bind = $mainMod, G, togglegroup                                                             # Alternar grupo de ventanas
bind = $mainMod, K, swapsplit                                                               # Intercambiar división
bind = $mainMod ALT, left, swapwindow, l                                                    # Intercambiar ventana a la izquierda
bind = $mainMod ALT, right, swapwindow, r                                                   # Intercambiar ventana a la derecha
bind = $mainMod ALT, up, swapwindow, u                                                      # Intercambiar ventana hacia arriba
bind = $mainMod ALT, down, swapwindow, d                                                    # Intercambiar ventana hacia abajo
binde = ALT,Tab,cyclenext                                                                   # Navegar entre ventanas
binde = ALT,Tab,bringactivetotop                                                            # Traer ventana activa al frente

# Acciones y Sistema
bind = $mainMod CTRL, R, exec, hyprctl reload                                             # Recargar configuración de Hyprland
bind = $mainMod SHIFT, A, exec, $HYPRSCRIPTS/toggle-animations.sh                         # Activar/Desactivar animaciones
bind = $mainMod, PRINT, exec, $HYPRSCRIPTS/screenshot.sh                                  # Tomar captura de pantalla (Menú)
bind = $mainMod ALT, F, exec, $HYPRSCRIPTS/screenshot.sh --instant                        # Captura de pantalla completa instantánea
bind = $mainMod ALT, S, exec, $HYPRSCRIPTS/screenshot.sh --instant-area                   # Captura de área instantánea
bind = $mainMod CTRL, Q, exec, ~/.config/ml4w/scripts/wlogout.sh                          # Abrir menú de apagado
bind = $mainMod SHIFT, W, exec, ~/.config/hypr/scripts/waypaper.sh --random               # Cambiar fondo de pantalla aleatorio
bind = $mainMod CTRL, W, exec, ~/.config/hypr/scripts/waypaper.sh                         # Abrir selector de fondos
bind = $mainMod ALT, W, exec, $HYPRSCRIPTS/wallpaper-automation.sh                        # Iniciar script de fondos automáticos
bind = $mainMod CTRL, K, exec, $HYPRSCRIPTS/keybindings.sh                                # Mostrar atajos de teclado
bind = $mainMod SHIFT, B, exec, ~/.config/waybar/launch.sh                                # Recargar barra de estado (Waybar)
bind = $mainMod CTRL, B, exec, ~/.config/waybar/toggle.sh                                 # Ocultar/Mostrar Waybar
bind = $mainMod SHIFT, R, exec, $HYPRSCRIPTS/loadconfig.sh                                # Recargar configuración base
bind = $mainMod CTRL, T, exec, ~/.config/waybar/themeswitcher.sh                          # Cambiar tema de Waybar
bind = $mainMod CTRL, S, exec, flatpak run com.ml4w.settings                              # Abrir configuración de ML4W
bind = $mainMod ALT, G, exec, $HYPRSCRIPTS/gamemode.sh                                    # Activar Modo Juego
bind = $mainMod CTRL, L, exec, ~/.config/hypr/scripts/power.sh lock                       # Bloquear la sesión
bind = $mainMod SHIFT, H, exec, $HYPRSCRIPTS/hyprshade.sh                                 # Filtro de luz azul nocturna
bind = CTRL, Tab, exec, ~/.config/ml4w/scripts/focus.sh                                   # Menú de selección de ventana
bind = CTRL ALT, T, exec, ~/.config/ml4w/themes/themes.sh                                 # Menú de selección de temas

# Espacios de Trabajo (Workspaces)
bind = $mainMod, 1, workspace, 1  # Ir al espacio de trabajo 1
bind = $mainMod, 2, workspace, 2  # Ir al espacio de trabajo 2
bind = $mainMod, 3, workspace, 3  # Ir al espacio de trabajo 3
bind = $mainMod, 4, workspace, 4  # Ir al espacio de trabajo 4
bind = $mainMod, 5, workspace, 5  # Ir al espacio de trabajo 5
bind = $mainMod, 6, workspace, 6  # Ir al espacio de trabajo 6
bind = $mainMod, 7, workspace, 7  # Ir al espacio de trabajo 7
bind = $mainMod, 8, workspace, 8  # Ir al espacio de trabajo 8
bind = $mainMod, 9, workspace, 9  # Ir al espacio de trabajo 9
bind = $mainMod, 0, workspace, 10 # Ir al espacio de trabajo 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1  # Mover ventana al espacio 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2  # Mover ventana al espacio 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3  # Mover ventana al espacio 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4  # Mover ventana al espacio 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5  # Mover ventana al espacio 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6  # Mover ventana al espacio 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7  # Mover ventana al espacio 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8  # Mover ventana al espacio 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9  # Mover ventana al espacio 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10 # Mover ventana al espacio 10

bind = $mainMod, Tab, workspace, m+1       # Ir al siguiente espacio de trabajo
bind = $mainMod SHIFT, Tab, workspace, m-1 # Ir al espacio anterior

bind = $mainMod CTRL, 1, exec, $HYPRSCRIPTS/moveTo.sh 1  # Mover TODAS las ventanas al espacio 1
bind = $mainMod CTRL, 2, exec, $HYPRSCRIPTS/moveTo.sh 2  # Mover TODAS las ventanas al espacio 2
bind = $mainMod CTRL, 3, exec, $HYPRSCRIPTS/moveTo.sh 3  # Mover TODAS las ventanas al espacio 3
bind = $mainMod CTRL, 4, exec, $HYPRSCRIPTS/moveTo.sh 4  # Mover TODAS las ventanas al espacio 4
bind = $mainMod CTRL, 5, exec, $HYPRSCRIPTS/moveTo.sh 5  # Mover TODAS las ventanas al espacio 5
bind = $mainMod CTRL, 6, exec, $HYPRSCRIPTS/moveTo.sh 6  # Mover TODAS las ventanas al espacio 6
bind = $mainMod CTRL, 7, exec, $HYPRSCRIPTS/moveTo.sh 7  # Mover TODAS las ventanas al espacio 7
bind = $mainMod CTRL, 8, exec, $HYPRSCRIPTS/moveTo.sh 8  # Mover TODAS las ventanas al espacio 8
bind = $mainMod CTRL, 9, exec, $HYPRSCRIPTS/moveTo.sh 9  # Mover TODAS las ventanas al espacio 9
bind = $mainMod CTRL, 0, exec, $HYPRSCRIPTS/moveTo.sh 10 # Mover TODAS las ventanas al espacio 10

bind = $mainMod, mouse_down, workspace, e+1  # Siguiente espacio (Rueda del ratón abajo)
bind = $mainMod, mouse_up, workspace, e-1    # Espacio anterior (Rueda del ratón arriba)
bind = $mainMod CTRL, down, workspace, empty # Ir al siguiente espacio vacío

# Teclas Fn (Control de Laptop)
bind = , XF86MonBrightnessUp, exec, brightnessctl -q s +10%                                          # Subir brillo de pantalla 10%
bind = , XF86MonBrightnessDown, exec, brightnessctl -q s 10%-                                        # Bajar brillo de pantalla 10%
bindle=, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+                  # Subir volumen 5%
bindle=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-                       # Bajar volumen 5%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle                              # Silenciar audio (Mutear)
bind = , XF86AudioPlay, exec, playerctl play-pause                                                   # Reproducir/Pausar música
bind = , XF86AudioPause, exec, playerctl pause                                                       # Pausar música
bind = , XF86AudioNext, exec, playerctl next                                                         # Siguiente canción
bind = , XF86AudioPrev, exec, playerctl previous                                                     # Canción anterior
bind = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle                       # Silenciar micrófono
bind = , XF86Calculator, exec, ~/.config/ml4w/settings/calculator.sh                                 # Abrir calculadora
bind = , XF86Lock, exec, hyprlock                                                                    # Bloquear pantalla (Hyprlock)
bind = , XF86Tools, exec, flatpak run com.ml4w.settings                                              # Abrir ajustes de ML4W

bind = , code:238, exec, brightnessctl -d smc::kbd_backlight s +10                                   # Subir brillo del teclado
bind = , code:237, exec, brightnessctl -d smc::kbd_backlight s 10-                                   # Bajar brillo del teclado

# Panel Lateral (Sidepad)
bind = $mainMod CTRL, right, exec, ~/.config/ml4w/scripts/sidepad.sh                                 # Abrir panel lateral
bind = $mainMod CTRL, left, exec, ~/.config/ml4w/scripts/sidepad.sh --hide                           # Cerrar panel lateral
bind = $mainMod, S, exec, ~/.config/ml4w/scripts/sidepad.sh --init                                   # Inicializar panel lateral
bind = $mainMod SHIFT, S, exec, ~/.config/ml4w/scripts/sidepad.sh --select                           # Seleccionar panel lateral

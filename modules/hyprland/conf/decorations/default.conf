# -----------------------------------------------------
# Decoration - SHARP FIRE STYLE
# -----------------------------------------------------
decoration {
    rounding = 8
    active_opacity = 0.96
    inactive_opacity = 0.90

    blur {
        enabled = true
        size = 6
        passes = 3
    }

    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(ffd70088) # Halo dorado suave
        color_inactive = rgba(00000000)
    }
}

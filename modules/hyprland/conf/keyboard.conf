# -----------------------------------------------------
# Keyboard Layout
# https://wiki.hyprland.org/Configuring/Variables/#input
# -----------------------------------------------------

# -----------------------------------------------------
# Keyboard & Touchpad Layout - PRO DEVELOPER EDITION --Jerimy
# -----------------------------------------------------

input {
    kb_layout = es
    kb_variant =
    kb_model =
    
    # TRUCO PRO: Convierte CapsLock en Escape (Vital para Neovim)
    # Si prefieres no tenerlo, borra esta linea.
    kb_options = caps:escape

    # VELOCIDAD DE ESCRITURA (Para programar rápido)
    repeat_rate = 50   # Repite la tecla más rápido (Standard es 25)
    repeat_delay = 300 # Espera menos para empezar a repetir (Standard es 600)

    numlock_by_default = true
    follow_mouse = 1
    mouse_refocus = false

    touchpad {
        # SCROLL NATURAL: Como en Mac/Celulares (Deslizar abajo sube la pagina)
        # Ponlo en 'false' si prefieres el estilo antiguo.
        natural_scroll = true 
        
        scroll_factor = 0.5  # Hace el scroll más suave y preciso
        disable_while_typing = true # Evita clicks fantasma al programar
        tap-to-click = true
        clickfinger_behavior = true # Clic con 2 dedos = Click derecho
    }
    
    sensitivity = 0 # Velocidad del puntero (0 es default)
}

# -----------------------------------------------------
# GESTOS (La magia de los 3 dedos)
# -----------------------------------------------------
gestures {
    workspace_swipe_distance = 300        # Cuánto mover para cambiar
    workspace_swipe_invert = true         # Invertir dirección (natural)
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_create_new = true     # Crear escritorio si no existe al deslizar
}

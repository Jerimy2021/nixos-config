# ==============================================================================
# REGLAS DE VENTANAS Y CAPAS (Sintaxis Nueva v0.54+)
# ==============================================================================

# --- 1. REGLAS DEL SIDEPAD (CLAUDE CODE) ---
windowrule = match:class ^(claude-sidepad)$, float on
windowrule = match:class ^(claude-sidepad)$, size 40% 95%
windowrule = match:class ^(claude-sidepad)$, move 59% 2.5%
windowrule = match:class ^(claude-sidepad)$, animation slide right
windowrule = match:class ^(claude-sidepad)$, opacity 0.95 0.85

# --- 2. OPACIDAD DINÁMICA (Estilo Jakoolit) ---
windowrule = match:class ^(kitty)$, opacity 0.95 0.80
windowrule = match:class ^(thunar)$, opacity 0.95 0.85
windowrule = match:class ^(nemo)$, opacity 0.90 0.80
windowrule = match:class ^(code-oss)$, opacity 0.95 0.85

# --- 3. UTILIDAD INVISIBLE ---
# NOTA: La regla 'idleinhibit' se maneja ahora desde hypridle.conf

# --- 4. MAGIA EN LAS CAPAS ---
# Las reglas de capas (layerrule) mantienen su formato clásico
layerrule = blur, rofi
layerrule = ignorezero, rofi
layerrule = dimaround, rofi      
layerrule = animation popin 80%, rofi

layerrule = blur, swaync-control-center
layerrule = ignorezero, swaync-control-center
layerrule = animation slide, swaync-control-center

layerrule = blur, swaync-notification-window
layerrule = ignorezero, swaync-notification-window

layerrule = blur, waybar
layerrule = ignorezero, waybar

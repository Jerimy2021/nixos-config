# ==============================================================================
# REGLAS DE VENTANAS Y CAPAS (Sintaxis Actualizada v0.54+)
# ==============================================================================

# --- 1. REGLAS DEL SIDEPAD (CLAUDE CODE) ---
windowrule {
    match:class = claude-sidepad
    float = on
    size = 40% 95%
    move = 59% 2.5%
    animation = slide right
    opacity = 0.95 0.85
}

# --- 2. OPACIDAD DINÁMICA (Estilo Jakoolit) ---
windowrule {
    match:class = ^(kitty)$
    opacity = 0.95 0.80
}

windowrule {
    match:class = ^(thunar)$
    opacity = 0.95 0.85
}

windowrule {
    match:class = ^(nemo)$
    opacity = 0.90 0.80
}

windowrule {
    match:class = ^(code-oss)$
    opacity = 0.95 0.85
}

# --- 3. UTILIDAD INVISIBLE ---
# NOTA: La regla 'idleinhibit' fue eliminada del núcleo de Hyprland. 
# Ahora la prevención de apagado de pantalla en videos se configura
# directamente en tu archivo hypridle.conf.

# --- 4. MAGIA EN LAS CAPAS ---
layerrule {
    match:namespace = rofi
    blur = on
    ignorezero = on
    dimaround = on
    animation = popin 80%
}

layerrule {
    match:namespace = swaync-control-center
    blur = on
    ignorezero = on
    animation = slide
}

layerrule {
    match:namespace = swaync-notification-window
    blur = on
    ignorezero = on
}

layerrule {
    match:namespace = waybar
    blur = on
    ignorezero = on
}

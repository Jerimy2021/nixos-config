# ==============================================================================
# REGLAS DE VENTANAS Y CAPAS (Aesthetic & UX)
# ==============================================================================

# --- 1. REGLAS DEL SIDEPAD (CLAUDE CODE) ---
windowrulev2 = float, class:(claude-sidepad)
windowrulev2 = size 40% 95%, class:(claude-sidepad)
windowrulev2 = move 59% 2.5%, class:(claude-sidepad)
windowrulev2 = animation slide right, class:(claude-sidepad)
windowrulev2 = opacity 0.95 0.85, class:(claude-sidepad) # Más transparente cuando pierde el foco

# --- 2. OPACIDAD DINÁMICA (Estilo Jakoolit) ---
# Formato: opacity [activa] [inactiva]. 
# Hace que la ventana en la que estás trabajando resalte, y las demás se difuminen.
windowrulev2 = opacity 0.95 0.80, class:^(kitty)$
windowrulev2 = opacity 0.95 0.85, class:^(thunar)$
windowrulev2 = opacity 0.90 0.80, class:^(nemo)$
windowrulev2 = opacity 0.95 0.85, class:^(code-oss)$

# --- 3. UTILIDAD INVISIBLE ---
# No apagar la pantalla si hay un video o juego en pantalla completa (Youtube, VLC, etc)
windowrulev2 = idleinhibit fullscreen, class:.*

# --- 4. MAGIA EN LAS CAPAS (Waybar, Rofi, Notificaciones) ---
# Rofi: Blur y efecto "Dimaround" (Oscurece el resto de la pantalla, ESTO ES CLAVE)
layerrule = blur, rofi
layerrule = ignorezero, rofi
layerrule = dimaround, rofi      
layerrule = animation popin 80%, rofi

# Centro de Notificaciones (Swaync): Blur y entrada suave
layerrule = blur, swaync-control-center
layerrule = blur, swaync-notification-window
layerrule = ignorezero, swaync-control-center
layerrule = ignorezero, swaync-notification-window
layerrule = animation slide, swaync-control-center

# Waybar: Permite que tenga blur si usas un tema semi-transparente
layerrule = blur, waybar
layerrule = ignorezero, waybar

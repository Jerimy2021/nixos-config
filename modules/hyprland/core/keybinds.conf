# ==============================================================================
# CORE: ATAJOS DE TECLADO (Optimizados y Nativos)
# ==============================================================================

$mainMod = SUPER

# --- VARIABLES DE APLICACIONES ---
$terminal = foot 
$browser = firefox
$fileManager = thunar
$menu = rofi -show drun -theme ~/.config/rofi/config.rasi 

# ==============================================================================
# 1. APLICACIONES PRINCIPALES Y MENÚS
# ==============================================================================
bind = $mainMod, Return, exec, $terminal           # Terminal
bind = $mainMod, B, exec, $browser                 # Navegador Web
bind = $mainMod, E, exec, $fileManager             # Explorador de Archivos
bind = $mainMod, D, exec, $menu                    # Menú de Apps (Drun)
bind = CTRL, Tab, exec, rofi -show window -theme ~/.config/rofi/glass-window.rasi # Cambiar Ventanas
bind = $mainMod CTRL, E, exec, rofimoji            # Menú de Emojis
bind = $mainMod CTRL, C, exec, rofi -show calc -modi calc -no-show-match -no-sort # Calculadora
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy # Portapapeles
bind = $mainMod CTRL, K, exec, bash -c 'cat ~/.config/hypr/assets/atajos.txt | rofi -dmenu -i -theme ~/.config/rofi/cheatsheet.rasi -p "󰌌  Atajos"'

# ==============================================================================
# 2. GESTIÓN DE VENTANAS Y ESTADOS
# ==============================================================================
bind = $mainMod, Q, killactive                  # Cerrar ventana actual
bind = $mainMod SHIFT, Q, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill # Forzar cierre
bind = $mainMod, F, fullscreen, 0                  # Pantalla completa real
bind = $mainMod, M, fullscreen, 1                  # Maximizar (Mantiene barra visible)
bind = $mainMod, T, togglefloating              # Alternar ventana flotante
bind = $mainMod SHIFT, T, workspaceopt, allfloat   # Alternar todas las ventanas a flotante
bind = $mainMod, J, layoutmsg, togglesplit    # Cambiar orientación de división (Dwindle)
bind = $mainMod, K, layoutmsg, swapsplit      # Intercambiar división
bind = $mainMod, G, togglegroup                  # Agrupar ventanas (Tabbed)
bind = ALT, Tab, cyclenext                       # Navegar entre ventanas
bind = ALT, Tab, bringactivetotop               # Traer ventana al frente

# ==============================================================================
# 3. FOCO, MOVIMIENTO Y REDIMENSIÓN
# ==============================================================================
# Foco (Moverse entre ventanas)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Mover ventanas de lugar
bind = $mainMod SHIFT, left, swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, up, swapwindow, u
bind = $mainMod SHIFT, down, swapwindow, d

# Redimensionar ventanas con teclado (Cambiado a ALT para no chocar con Claude)
bind = $mainMod ALT, right, resizeactive, 30 0
bind = $mainMod ALT, left, resizeactive, -30 0
bind = $mainMod ALT, up, resizeactive, 0 -30
bind = $mainMod ALT, down, resizeactive, 0 30

# Mouse: Mover y Redimensionar
bindm = $mainMod, mouse:272, movewindow            # Click Izquierdo sostenido para mover
bindm = $mainMod, mouse:273, resizewindow          # Click Derecho sostenido para redimensionar

# ==============================================================================
# 4. NAVEGACIÓN DE ESPACIOS DE TRABAJO (Workspaces)
# ==============================================================================
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Mover ventana activa a otro workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Navegación rápida
bind = $mainMod, mouse_down, workspace, e+1        # Rueda ratón abajo = Siguiente WS
bind = $mainMod, mouse_up, workspace, e-1          # Rueda ratón arriba = Anterior WS
bind = $mainMod, Tab, workspace, m+1               # Siguiente workspace
bind = $mainMod SHIFT, Tab, workspace, m-1         # Workspace anterior
bind = $mainMod CTRL, down, workspace, empty       # Siguiente workspace vacío

# ==============================================================================
# 5. SISTEMA, MEDIOS Y HARDWARE
# ==============================================================================
bind = , XF86Lock, exec, hyprlock                  # Botón físico de bloqueo
bind = , XF86PowerOff, exec, wlogout -b 5          # Botón físico de encendido
bind = $mainMod CTRL, L, exec, hyprlock            # Bloquear sesión manual
bind = $mainMod CTRL, Q, exec, wlogout -b 5        # Menú de apagado

# Volumen
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Medios
bindl  = ,XF86AudioPlay, exec, playerctl play-pause
bindl  = ,XF86AudioPause, exec, playerctl play-pause
bindl  = ,XF86AudioNext, exec, playerctl next
bindl  = ,XF86AudioPrev, exec, playerctl previous

# Brillo
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# ==============================================================================
# 6. HERRAMIENTAS, ESTÉTICA Y SCRIPTS
# ==============================================================================
# Waybar y Entorno
bind = $mainMod CTRL, B, exec, bash -c 'killall -SIGUSR1 waybar || waybar &' # Ocultar/Mostrar barra
bind = $mainMod SHIFT, B, exec, ~/.config/waybar/launch.sh                 # Reiniciar barra completa
bind = $mainMod CTRL, T, exec, ~/.config/waybar/themeswitcher.sh           # Cambiar tema de Waybar
bind = $mainMod SHIFT, R, exec, hyprctl reload                             # Recargar configuración Hyprland

# Fondos y Shaders
bind = $mainMod ALT, W, exec, waypaper --random                            # Fondo aleatorio
bind = $mainMod CTRL, W, exec, waypaper                                    # Selector de fondos
bind = $mainMod SHIFT, H, exec, hyprshade toggle blue-light-filter         # Filtro luz azul

# Modo Juego
bind = $mainMod ALT, G, exec, hypr-gamemode                                # Activar/Desactivar

# Capturas de Pantalla (Grimblast y estándar)
bind = , PRINT, exec, grim -g "$(slurp)" - | wl-copy                       # Recorte rápido
bind = $mainMod ALT, F, exec, grimblast --notify copysave screen           # Pantalla completa
bind = $mainMod ALT, S, exec, grimblast --notify copysave area             # Recorte avanzado

# Pantalla (Zoom)
bind = $mainMod SHIFT, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') + 0.5}")
bind = $mainMod SHIFT, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') - 0.5}")
bind = $mainMod SHIFT, Z, exec, hyprctl keyword cursor:zoom_factor 1       # Restablecer zoom

# ==============================================================================
# 7. ZONAS MÁGICAS (Special Workspaces)
# ==============================================================================
# Sidepad Genérico
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Sidepad de Claude Code
workspace = special:claude, on-created-empty: foot --class claude-sidepad -e zsh -c 'npx @anthropic-ai/claude-code'
bind = $mainMod CTRL, right, togglespecialworkspace, claude      
bind = $mainMod CTRL, left, togglespecialworkspace, claude

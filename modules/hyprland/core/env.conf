# ==============================================================================
# CORE: VARIABLES DE ENTORNO (Híbrido Optimus: Intel Main + NVIDIA Offload)
# ==============================================================================

# 1. CURSORES CONSISTENTES
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24

# 2. SISTEMA WAYLAND
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# 3. COMPATIBILIDAD DE TOOLKITS (Fuerza Wayland nativo en apps)
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = OZONE_PLATFORM,wayland

# 4. ACELERACIÓN DE HARDWARE (Manejo inteligente de la GPU)
# Usamos el driver de Intel (iHD) para el escritorio y reproducción de video.
# Esto asegura animaciones a 60Hz estables y salva tu batería.
env = LIBVA_DRIVER_NAME,iHD

# (Nota: No forzamos las variables de NVIDIA aquí a nivel global para no 
# mantener la MX130 encendida al 100% todo el tiempo).
# __NV_PRIME_RENDER_OFFLOAD=1 __VK_LAYER_NV_optimus=NVIDIA_only __GLX_VENDOR_LIBRARY_NAME=nvidia nombre_del_juego
# paquete de nombre nvidia-offload o configurar en steam para que que inyecte estas variables automáticamente en las opciones de lanzamiento del juego.

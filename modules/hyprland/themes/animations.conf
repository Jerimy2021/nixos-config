# ==============================================================================
# ANIMATION ENGINE (Ultimate Fusion: End-4 + Jakoolit + Dynamic)
# ==============================================================================

animations {
    enabled = true

    # --- 1. CURVAS MAESTRAS (El arsenal matemático completo) ---
    # Elegancia Material (End-4)
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07
    
    # Rebotes y Fluidez (Smooth / Jakoolit)
    bezier = easeOutBack, 0.34, 1.56, 0.64, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    
    # Movimiento Continuo (Dynamic / High)
    bezier = linear, 0, 0, 1, 1
    bezier = wind, 0.05, 0.9, 0.1, 1.05

    # --- 2. REGLAS DE VENTANAS (El comportamiento visual) ---
    # Las ventanas abren con un pequeño efecto de rebote sedoso (easeOutBack) y cierran rápido hacia adentro.
    animation = windows, 1, 5, wind, slide
    animation = windowsIn, 1, 4, easeOutBack, popin 60%
    animation = windowsOut, 1, 3, md3_accel, popin 60%
    animation = windowsMove, 1, 4, menu_decel, slide

    # --- 3. EL MOTOR DE ENERGÍA (Bordes RGB que giran) ---
    animation = border, 1, 5, default
    animation = borderangle, 1, 30, linear, loop

    # --- 4. INTERFACES (Waybar, Rofi, Menús) ---
    # Usamos las curvas de End-4 para que los menús se deslicen de forma ultra profesional
    animation = fade, 1, 3, md3_decel
    animation = layersIn, 1, 3, menu_decel, slide
    animation = layersOut, 1, 1.6, menu_accel
    animation = fadeLayersIn, 1, 2, menu_decel
    animation = fadeLayersOut, 1, 4.5, menu_accel

    # --- 5. ESPACIOS DE TRABAJO (Workspaces) ---
    animation = workspaces, 1, 5, menu_decel, slide
    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}

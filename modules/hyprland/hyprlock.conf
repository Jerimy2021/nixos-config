# ==============================================================================
# HYPRLOCK: EXTREME AESTHETICS (Glassmorphism & Neon)
# ==============================================================================

source = ~/.config/hypr/theme/colors.conf

general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
}

# 2. FONDO: EFECTO CRISTAL EN TIEMPO REAL
background {
    monitor =
    path = screenshot
    blur_passes = 3 # Nivel de desenfoque (1-5)
    blur_size = 8
    noise = 0.0117
    contrast = 1.3000
    brightness = 0.8000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

# 3. AVATAR DE USUARIO
image {
    monitor =
    path = ~/.face.icon # Asegúrate de poner una foto tuya aquí en el futuro
    size = 150
    rounding = -1
    border_size = 4
    border_color = $accent_magenta $accent_cyan 45deg
    position = 0, 150
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 10
    shadow_color = rgba(0,0,0,0.5)
}

# 4. RELOJ GIGANTE CYBERPUNK
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H:%M") </big></b>"
    color = $accent_cyan
    font_size = 90
    font_family = JetBrainsMono Nerd Font
    position = 0, -50
    halign = center
    valign = top
    shadow_passes = 3
    shadow_size = 15
    shadow_color = rgba(0,0,0,0.8)
}

# 5. FECHA ELEGANTE
label {
    monitor =
    text = cmd[update:18000000] echo "<b> $(date +"%A, %d de %B") </b>"
    color = rgba(255, 255, 255, 0.9)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, -180
    halign = center
    valign = top
}

# 6. CAJA DE CONTRASEÑA TROLL
input-field {
    monitor =
    size = 280, 60
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    
    outer_color = $border_inactive
    inner_color = rgba(10, 10, 15, 0.6) 
    font_color = rgba(255, 255, 255, 0.9)
    
    fade_on_empty = false
    placeholder_text = <i><span foreground="##ffffff99">Identifícate...</span></i>
    fail_color = $accent_magenta
    fail_text = <i>Intento $ATTEMPTS... Jerimy, ¿de verdad eres tú? 🤨</i>
    
    capslock_color = $accent_cyan
    
    position = 0, -120
    halign = center
    valign = center
    
    shadow_passes = 2
    shadow_size = 15
    shadow_color = rgba(0,0,0,0.6)
}

# 7. MENSAJE DE BIENVENIDA
label {
    monitor =
    text = Hola de nuevo, <b>$USER</b>
    color = rgba(255, 255, 255, 0.8)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -220
    halign = center
    valign = center
}
